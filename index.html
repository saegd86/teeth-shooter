<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>歯の防衛軍 - 滅菌大作戦（ランダム復刻版）</title>
  <style>
    body { background: #222; color: white; text-align: center; overflow: hidden; margin: 0; font-family: sans-serif; }

    #game-container {
      position: relative; width: 100vw; height: 100vh;
      background: radial-gradient(circle, #ffc0cb, #ffb6c1);
      margin: 0 auto; border-bottom: 8px solid #ff69b4;
      overflow: hidden; touch-action: none; cursor: crosshair;
    }

    #score {
      position: absolute; top: 20px; left: 20px;
      color: #d00000; font-size: 32px; font-weight: bold; z-index: 100;
      text-shadow: 2px 2px 0px white;
    }

    #player { position: absolute; bottom: 60px; left: 50%; z-index: 10; transition: 0.05s; transform: translateX(-50%); }
    #player img {
      width: 140px; height: 140px; object-fit: contain;
      display: block; user-select:none; pointer-events:none; -webkit-user-drag:none;
    }

    .enemy { position: absolute; z-index: 5; }
    .enemy img {
      width: 50px; height: 50px; object-fit: contain;
      display: block; user-select:none; pointer-events:none; -webkit-user-drag:none;
    }

    .bullet { position: absolute; font-size: 25px; z-index: 4; pointer-events:none; user-select:none; }

    .beam {
      position: absolute;
      bottom: 100px;
      width: 50px;
      background: rgba(0, 255, 255, 0.7);
      box-shadow: 0 0 20px #00ffff;
      transform: translateX(-50%);
      z-index: 3;
    }

    /* チャージ（スマホでも切れない＆テキストはバーの上） */
    #charge-container {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: 320px;
      z-index: 9999;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;

      pointer-events: none;
    }

    #charge-frame {
      width: 100%;
      height: 8px;
      background: #555;
      border-radius: 5px;
      overflow: hidden;
    }

    #charge-fill {
      height: 100%;
      width: 0%;
      background: #00ffff;
      border-radius: 5px;
      transition: 0.2s;
    }

    #beam-charge-text {
      font-size: 11.5px;
      font-weight: 950;
      color: rgba(40, 0, 45, 0.95);
      white-space: nowrap;
      user-select: none;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    }

    #boss-hp-container {
      position: absolute; top: 70px; left: 50%;
      transform: translateX(-50%);
      width: 80%; height: 20px;
      background: #333; display: none; z-index: 100;
    }
    #boss-hp { width: 100%; height: 100%; background: #ff0000; }

    .boss { position: absolute; z-index: 6; }
    .boss img {
      width: 330px; height: 330px;
      object-fit: contain;
      display: block; user-select:none; pointer-events:none; -webkit-user-drag:none;
    }

    #mobile-tip {
      position: absolute;
      bottom: 82px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 130;
      font-weight: 900;
      font-size: 12px;
      color: rgba(40, 0, 45, 0.8);
      background: rgba(255, 255, 255, 0.4);
      padding: 6px 10px;
      border-radius: 999px;
      display: none;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>

<body>
  <div id="game-container">
    <div id="score">SCORE: 0</div>
    <div id="player" aria-label="player"></div>

    <div id="boss-hp-container"><div id="boss-hp"></div></div>

    <div id="charge-container">
      <div id="charge-frame"><div id="charge-fill"></div></div>
      <div id="beam-charge-text">必殺技：右クリック（PC） / 長押し（スマホ）</div>
    </div>

    <div id="mobile-tip">スマホは「長押し」でビーム</div>
  </div>

  <script>
    let __teethGameStarted = false;

    function startGame() {
      if (__teethGameStarted) return;
      __teethGameStarted = true;

      let score = 0;
      let charge = 0;
      let bossActive = false;
      let bossHP = 100;

      const isMobile = /Mobi|Android/i.test(navigator.userAgent);

      const ASSET = {
        player: 'https://lh3.googleusercontent.com/pw/AP1GczPPUkdPu1gSfXNsbBdZBNXv1AlPzWVFMrjIdTXKRw-f5DgveIpwMY-ABgIo2js4Us1s3CPaBYax_-a9jenFxFJY025Rqvjqv2vtOS-wxE8s34onCfj_kpuONJlDvaDrf1h9H6q_sqphX6s3WTWOVrRD=w729-h911-s-no-gm',
        enemy:  'https://lh3.googleusercontent.com/pw/AP1GczNJt7YEwIRTslg-7I4gO3tg_fC2ivisB2oqH_ft5-RMeT7vhwvVSENYrQtRrVmlmFbz5DTEpLtSEgnmedrN9pvfOObIff_BHA4JnA5XUvxCWOJa30ex625XCSNfzDcaJMqEyQBGG0fWi2jv63v_r_JI=w350-h362-s-no-gm',
        boss:   'https://lh3.googleusercontent.com/pw/AP1GczMU093fP2J-3ZzNUZH79PVwl2HYqxMlnPCHTT6Qfd-8j9CnC9Cz2MJBttzK70lNc_dA_19XFP83LB7KjfxSMnZYkRBCosayb0JWO_nw1lkoGIvoLpv2dB7Yrrz6lq7jV1FPT_SkNjQXcNyFhqNQBzIC=w729-h911-s-no-gm'
      };

      const player = document.getElementById('player');
      const container = document.getElementById('game-container');
      const chargeFill = document.getElementById('charge-fill');
      const bossHPBar = document.getElementById('boss-hp');
      const bossHPContainer = document.getElementById('boss-hp-container');
      const mobileTip = document.getElementById('mobile-tip');
      const beamChargeText = document.getElementById('beam-charge-text');

      // スマホ/PCで表記を切り替え
      if (beamChargeText) {
        beamChargeText.textContent = isMobile
          ? '必殺技：長押し'
          : '必殺技：右クリック';
      }

      let playerX = window.innerWidth / 2;

      player.innerHTML = `<img src="${ASSET.player}" alt="player">`;

      if (isMobile) {
        mobileTip.style.display = 'block';
        setTimeout(() => mobileTip.style.display = 'none', 2500);
      }

      const updatePos = (x) => {
        playerX = Math.max(25, Math.min(x, window.innerWidth - 25));
        player.style.left = playerX + 'px';
      };

      container.addEventListener('mousemove', (e) => updatePos(e.clientX));
      container.addEventListener('touchmove', (e) => {
        updatePos(e.touches[0].clientX);
        e.preventDefault();
      }, { passive: false });

      const fireBeam = () => {
        if (charge < 100) return;

        charge = 0;
        if (chargeFill) chargeFill.style.width = '0%';

        const beam = document.createElement('div');
        beam.className = 'beam';
        beam.style.left = player.style.left;
        container.appendChild(beam);

        let h = 0;
        let beamTimer = setInterval(() => {
          h += 60;
          beam.style.height = h + 'px';

          // 敵（ビームで撃破）
          const enemies = document.getElementsByClassName('enemy');
          for (let e of enemies) {
            if (e.dataset.state !== 'alive') continue;

            if (Math.abs(parseInt(e.style.left) - (playerX - 25)) < 70) {
              e.dataset.state = 'dead';
              score += 20;
              document.getElementById('score').innerText = "SCORE: " + score;

              e.innerHTML = '✨';
              setTimeout(() => e.remove(), 100);
            }
          }

          // ボス（ビームでダメージ）
          if (bossActive) {
            const bElement = document.querySelector('.boss');
            if (bElement) {
              const bossCenterX = parseInt(bElement.style.left) + 165; // 330/2
              if (Math.abs(bossCenterX - playerX) < 70) damageBoss(5);
            }
          }

          if (h > window.innerHeight) {
            clearInterval(beamTimer);
            setTimeout(() => beam.remove(), 200);
          }
        }, 10);
      };

      // PC：右クリック
      container.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        fireBeam();
      });

      // スマホ：長押し
      let longPressTimer = null;
      container.addEventListener('touchstart', () => {
        longPressTimer = setTimeout(() => fireBeam(), 550);
      }, { passive: true });

      container.addEventListener('touchend', () => {
        if (longPressTimer) clearTimeout(longPressTimer);
        longPressTimer = null;
      });

      container.addEventListener('touchcancel', () => {
        if (longPressTimer) clearTimeout(longPressTimer);
        longPressTimer = null;
      });

      // PC：スペースでもOK（念のため）
      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.keyCode === 32) {
          e.preventDefault();
          fireBeam();
        }
      });

      // 弾（💧）
      setInterval(() => {
        let angles = score >= 3000 ? [-30, -15, 0, 15, 30] : [-15, 0, 15];

        angles.forEach(angle => {
          const bullet = document.createElement('div');
          bullet.className = 'bullet';
          bullet.innerHTML = '💧';
          bullet.style.left = (playerX - 12) + 'px';
          bullet.style.bottom = '90px';
          container.appendChild(bullet);

          let bPB = 90, bPL = playerX - 12;
          let t = setInterval(() => {
            bPB += 18;
            bPL += (angle / 4);
            bullet.style.bottom = bPB + 'px';
            bullet.style.left = bPL + 'px';

            if (bPB > window.innerHeight || bPL < -20 || bPL > window.innerWidth + 20) {
              clearInterval(t);
              bullet.remove();
            }
          }, 10);
        });

        charge = Math.min(100, charge + 3);
        if (chargeFill) chargeFill.style.width = charge + '%';
      }, 220);

      function spawnBoss() {
        bossActive = true;
        bossHP = 100;
        bossHPContainer.style.display = 'block';

        const boss = document.createElement('div');
        boss.className = 'boss';
        boss.innerHTML = `<img src="${ASSET.boss}" alt="boss">`;

        const centerX = window.innerWidth / 2;
        boss.style.left = (centerX - 165) + 'px';
        boss.style.top = '-180px';
        container.appendChild(boss);

        let ty = -180, tx = centerX - 165, dir = 1;
        let bt = setInterval(() => {
          if (ty < 120) ty += 2;

          tx += 3 * dir;

          // ←ここがポイント：
          // ボス330px大きめで「画面外に消えてもOK」なので、跳ね返し範囲をゆるめる
          // 表示領域を少し外に許可
          if (tx > window.innerWidth - 330 - 120 || tx < -120) dir *= -1;

          boss.style.top = ty + 'px';
          boss.style.left = tx + 'px';

          if (!bossActive) {
            clearInterval(bt);
            boss.remove();
          }
        }, 20);
      }

      function damageBoss(amount) {
        bossHP -= amount;
        bossHPBar.style.width = bossHP + '%';

        if (bossHP <= 0) {
          bossActive = false;
          bossHPContainer.style.display = 'none';

          score += 1000;
          document.getElementById('score').innerText = "SCORE: " + score;

          const b = document.querySelector('.boss');
          if (b) b.innerHTML = '✨💥✨';
          setTimeout(() => { if (b) b.remove(); }, 500);
        }
      }

      // 敵生成（通常💧でもボスにダメージ）
      setInterval(() => {
        if (bossActive) return;

        const enemy = document.createElement('div');
        enemy.className = 'enemy';
        enemy.dataset.state = 'alive';
        enemy.innerHTML = `<img src="${ASSET.enemy}" alt="enemy">`;
        enemy.style.left = Math.random() * (window.innerWidth - 50) + 'px';
        enemy.style.top = '-50px';
        container.appendChild(enemy);

        let ePos = -50;
        let speed = 4 + Math.min(score / 1500, 8);

        let t = setInterval(() => {
          ePos += speed;
          enemy.style.top = ePos + 'px';

          // 敵を通常弾（💧）で撃破
          const bullets = document.getElementsByClassName('bullet');
          for (let b of bullets) {
            if (enemy.dataset.state !== 'alive') continue;

            const bulletLeft = parseInt(b.style.left);
            const bulletTop = container.offsetHeight - parseInt(b.style.bottom) - 25;

            const enemyLeft = parseInt(enemy.style.left) + 25;
            const enemyTop = parseInt(enemy.style.top) + 25;

            if (Math.abs(bulletLeft + 12 - enemyLeft) < 30 && Math.abs(bulletTop - enemyTop) < 35) {
              enemy.dataset.state = 'dead';
              enemy.innerHTML = '✨';

              const msg = document.createElement('div');
              const msgs = ['バイバイ菌！', 'ナイス！', 'スッキリ！', '滅菌！'];
              msg.innerText = msgs[Math.floor(Math.random() * msgs.length)];
              msg.style.cssText = `position:absolute; left:${enemy.style.left}; top:${enemy.style.top}; color:#ff00ff; font-weight:bold; font-size:18px; z-index:50; pointer-events:none;`;
              container.appendChild(msg);

              setTimeout(() => msg.remove(), 500);
              setTimeout(() => enemy.remove(), 100);

              b.remove();
              score += 10;
              document.getElementById('score').innerText = "SCORE: " + score;

              if (score > 0 && score % 500 === 0) spawnBoss(); // ボス早め
              return;
            }
          }

          if (ePos > window.innerHeight) {
            clearInterval(t);
            enemy.remove();
          }
        }, 20);
      }, 700);

      // ボスが出ている間：💧でボスにもダメージ
      setInterval(() => {
        if (!bossActive) return;

        const bossEl = document.querySelector('.boss');
        if (!bossEl) return;

        const bossCenterX = parseInt(bossEl.style.left) + 165;
        const bossCenterY = parseInt(bossEl.style.top) + 165;

        const bullets = document.getElementsByClassName('bullet');
        for (let b of bullets) {
          const bulletLeft = parseInt(b.style.left);
          const bulletTop = container.offsetHeight - parseInt(b.style.bottom) - 25;

          const dx = Math.abs(bulletLeft + 12 - bossCenterX);
          const dy = Math.abs(bulletTop - bossCenterY);

          if (dx < 45 && dy < 60) {
            b.remove();
            damageBoss(3);
            break;
          }
        }
      }, 80);
    }

    startGame();
  </script>
</body>
</html>
